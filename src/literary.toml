# src/literary.toml - hand-authored literary surface data
#
# Plan 1 ships home stable_utility for every character. Per-act variants for
# hybrid-voice cross-act characters are deferred to Slice 1 because act-site
# context dictates the exact phrase.

[play]
title = "Shakedown: A Most Excellent Tragicomedy of Glyph and Line."

[acts.act1]
title = "Wherein the witches sort raw matter into shelves and seals."

[acts.act2]
title = "Wherein the kingdom of blocks is shaped, and each form named."

[acts.act3]
title = "Wherein the lovers gild the line with light and rose."

[acts.act4]
title = "Wherein Prospero, his work done, inscribes and releases all."

[value_atoms.default]
v0 = "nothing"
v1 = "a cat"
v2 = "a black cat"
v4 = "a furry black cat"
v8 = "a little furry black cat"
v16 = "a normal little furry black cat"

[production_motifs]
juliet = ["night", "star", "stars", "starlit", "silver"]
prospero = ["revels", "inscribes", "releases", "seals"]
